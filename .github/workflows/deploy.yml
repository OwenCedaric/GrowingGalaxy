name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'README_zh.md'
      - '.gitignore'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    strategy:
      matrix:
        wranglerVersion: ['3.114.12']
        nodeVersion: ['24']

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.nodeVersion }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Cache Astro Build
        uses: actions/cache@v5
        with:
          path: node_modules/.astro
          key: ${{ runner.os }}-astro-build-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-astro-build-

      - name: Get Content Hash
        id: content-hash
        run: echo "hash=${{ hashFiles('src/content/**', 'mcp.config.ts', 'src/pages/raw/**', 'src/utils/mcp-meta.ts') }}" >> $GITHUB_OUTPUT

      - name: Cache Vector Index
        id: vector-cache
        uses: actions/cache@v5
        with:
          path: vectors.ndjson
          key: ${{ runner.os }}-vector-index-${{ steps.content-hash.outputs.hash }}

      - name: Reconcile Vectorize Index
        id: reconcile
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Extracting configuration from mcp.config.ts..."
          CONFIG_PATH="./mcp.config.ts"
          INDEX_NAME=$(npx tsx -e "import { MCP_CONFIG } from '$CONFIG_PATH'; process.stdout.write(MCP_CONFIG.server.name)")
          EXPECTED_DIM=$(npx tsx -e "import { MCP_CONFIG } from '$CONFIG_PATH'; process.stdout.write(MCP_CONFIG.ai.dimensions.toString())")
          EXPECTED_METRIC=$(npx tsx -e "import { MCP_CONFIG } from '$CONFIG_PATH'; process.stdout.write(MCP_CONFIG.ai.metric)")
          
          echo "index_name=$INDEX_NAME" >> $GITHUB_OUTPUT
          echo "rebuilt=false" >> $GITHUB_OUTPUT

          echo "Checking remote Vectorize index status..."
          CURRENT_DIM=$(npx wrangler vectorize get $INDEX_NAME --json 2>/dev/null | jq -r '.. | .dimensions? | select(. != null)' | head -n 1)
          
          NEEDS_REBUILD=false
          if [ -z "$CURRENT_DIM" ] || [ "$CURRENT_DIM" = "null" ]; then
             echo "Index does not exist. Creating..."
             NEEDS_REBUILD=true
          elif [ "$CURRENT_DIM" != "$EXPECTED_DIM" ]; then
             echo "Dimension mismatch! Remote is $CURRENT_DIM, expected is $EXPECTED_DIM."
             NEEDS_REBUILD=true
          elif [ "${{ steps.vector-cache.outputs.cache-hit }}" != "true" ]; then
             echo "Vector cache miss! Forcing index reset for consistency..."
             NEEDS_REBUILD=true
          else
             echo "Dimensions match ($CURRENT_DIM) and cache hit."
          fi

          if [ "$NEEDS_REBUILD" = true ]; then
             if [ -n "$CURRENT_DIM" ] && [ "$CURRENT_DIM" != "null" ]; then
                 echo "Deleting old index..."
                 npx wrangler vectorize delete $INDEX_NAME --force
                 sleep 5
             fi
             echo "Creating new index..."
             npx wrangler vectorize create $INDEX_NAME --dimensions $EXPECTED_DIM --metric $EXPECTED_METRIC
             echo "rebuilt=true" >> $GITHUB_OUTPUT 
          fi

      - name: Build Astro site
        run: pnpm run build

      - name: Generate MCP Vector Index (Local AI)
        if: steps.vector-cache.outputs.cache-hit != 'true'
        run: pnpm run build_index

      - name: Sync Vectorize Database
        if: github.ref == 'refs/heads/main' && (steps.vector-cache.outputs.cache-hit != 'true' || steps.reconcile.outputs.rebuilt == 'true')
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: vectorize insert ${{ steps.reconcile.outputs.index_name }} --file=vectors.ndjson

      - name: Deploy Worker & Static Assets
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: ${{ matrix.wranglerVersion }}
