name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'README_zh.md'
      - '.gitignore'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    
    strategy:
      matrix:
        wranglerVersion: ['3.114.12']
        nodeVersion: ['24']

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.nodeVersion }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Cache Astro Build
        uses: actions/cache@v5
        with:
          path: node_modules/.astro
          key: ${{ runner.os }}-astro-build-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-astro-build-

      - name: Checkout State
        run: |
          git fetch origin infra/vector-state || true
          if git ls-remote --exit-code --heads origin infra/vector-state; then
            git worktree add state origin/infra/vector-state
          else
            mkdir state
            cd state
            git init
            git checkout --orphan infra/vector-state
            echo "{}" > manifest.json
            git add manifest.json
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Initialize vector state branch"
            git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            git push -u origin infra/vector-state
          fi

      - name: Reconcile Vectorize Index
        id: reconcile
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Extracting configuration from mcp.config.ts..."
          CONFIG_PATH="./mcp.config.ts"
          INDEX_NAME=$(npx tsx -e "import { MCP_CONFIG } from '$CONFIG_PATH'; process.stdout.write(MCP_CONFIG.server.name)")
          EXPECTED_DIM=$(npx tsx -e "import { MCP_CONFIG } from '$CONFIG_PATH'; process.stdout.write(MCP_CONFIG.ai.dimensions.toString())")
          EXPECTED_METRIC=$(npx tsx -e "import { MCP_CONFIG } from '$CONFIG_PATH'; process.stdout.write(MCP_CONFIG.ai.metric)")
          
          echo "index_name=$INDEX_NAME" >> $GITHUB_OUTPUT
          echo "rebuilt=false" >> $GITHUB_OUTPUT

          echo "Checking remote Vectorize index status..."
          CURRENT_DIM=$(npx wrangler vectorize get $INDEX_NAME --json 2>/dev/null | jq -r '.. | .dimensions? | select(. != null)' | head -n 1)
          
          NEEDS_REBUILD=false
          if [ -z "$CURRENT_DIM" ] || [ "$CURRENT_DIM" = "null" ]; then
             echo "Index does not exist. Creating..."
             NEEDS_REBUILD=true
          elif [ "$CURRENT_DIM" != "$EXPECTED_DIM" ]; then
             echo "Dimension mismatch! Remote is $CURRENT_DIM, expected is $EXPECTED_DIM."
             NEEDS_REBUILD=true
          else
             echo "Dimensions match ($CURRENT_DIM)."
          fi

          if [ "$NEEDS_REBUILD" = true ]; then
             if [ -n "$CURRENT_DIM" ] && [ "$CURRENT_DIM" != "null" ]; then
                 echo "Deleting old index..."
                 npx wrangler vectorize delete $INDEX_NAME --force
                 sleep 5
             fi
             echo "Creating new index..."
             npx wrangler vectorize create $INDEX_NAME --dimensions $EXPECTED_DIM --metric $EXPECTED_METRIC
             echo "rebuilt=true" >> $GITHUB_OUTPUT
             echo "Purging local state manifest due to index rebuild..."
             rm -f state/manifest.json
          fi

      - name: Build Astro site
        run: pnpm run build

      - name: Generate MCP Vector Index (Local AI)
        run: pnpm run build_index

      - name: Batch Cleanup Vectorize Database
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -f deletions.json ]; then
            deletions=$(cat deletions.json)
            count=$(echo $deletions | jq 'length')
            if [ "$count" -gt 0 ]; then
               echo "Deleting $count chunks..."
               for ((i=0; i<$count; i+=500)); do
                  batch=$(echo $deletions | jq -r ".[$i:$((i+500))] | map(\"\\\"\" + . + \"\\\"\") | join(\" \")")
                  if [ -n "$batch" ]; then
                     eval "npx wrangler vectorize delete-vectors ${{ steps.reconcile.outputs.index_name }} --ids $batch"
                  fi
               done
            else
               echo "No deletions needed."
            fi
          else
            echo "deletions.json not found."
          fi

      - name: Sync Vectorize Database
        if: github.ref == 'refs/heads/main'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -s vectors.ndjson ]; then
            npx wrangler vectorize insert ${{ steps.reconcile.outputs.index_name }} --file=vectors.ndjson
          else
            echo "vectors.ndjson is empty or not found. Skipping insert."
          fi

      - name: Commit and Push State
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd state
          git add manifest.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff-index --quiet HEAD --; then
             echo "No state changes."
          else
             git commit -m "chore(ai): update vector state manifest [skip ci]"
             if git config remote.origin.url > /dev/null 2>&1; then
                git push origin HEAD:refs/heads/infra/vector-state
             else
                git push "https://${{ github.actor }}:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:refs/heads/infra/vector-state
             fi
          fi

      - name: Deploy Worker & Static Assets
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: ${{ matrix.wranglerVersion }}
